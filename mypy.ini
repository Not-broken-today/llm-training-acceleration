[mypy]
python_version = 3.12
mypy_path = ./scr
explicit_package_bases = True
ignore_missing_imports = True
warn_return_any = False
warn_unused_configs = False
disallow_untyped_defs = False

[mypy-datasets.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-hydra.*]
ignore_missing_imports = True

[mypy-omegaconf.*]
ignore_missing_imports = True

[mypy-peft.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True